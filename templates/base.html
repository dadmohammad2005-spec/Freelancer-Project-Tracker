{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freelancer Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background-color: #f1f4f9; }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
            width: 250px;
            position: fixed;
        }
        .brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.25rem;
            padding: 22px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .brand i { color: #fbbf24; }
        .sidebar nav { padding: 16px 12px; }
        .sidebar a {
            color: #c7d2fe;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-weight: 500;
            transition: 0.2s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .sidebar a.active {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 10px rgba(99,102,241,0.4);
        }
        .sidebar hr { border-color: rgba(255,255,255,0.15); }

        .main-content { margin-left: 250px; padding: 30px; }

        /* Stat Cards */
        .card-stat {
            border: none;
            border-radius: 16px;
            padding: 22px;
            color: #fff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .card-stat .icon-badge {
            width: 46px; height: 46px;
            border-radius: 12px;
            background: rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        .stat-clients { background: linear-gradient(135deg, #6366f1, #4338ca); }
        .stat-projects { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .stat-active { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-invoices { background: linear-gradient(135deg, #f43f5e, #be123c); }

        /* General Cards */
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        /* Buttons */
        .btn-primary-grad {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: #fff; border: none; border-radius: 10px;
            padding: 9px 20px; font-weight: 500;
            box-shadow: 0 4px 10px rgba(99,102,241,0.35);
        }
        .btn-primary-grad:hover { color: #fff; opacity: 0.9; }

        .btn-soft-edit {
            background: #e0e7ff; color: #4338ca; border: none;
            border-radius: 8px; font-weight: 500; padding: 5px 14px;
        }
        .btn-soft-delete {
            background: #fee2e2; color: #b91c1c; border: none;
            border-radius: 8px; font-weight: 500; padding: 5px 14px;
        }
        .btn-soft-edit:hover, .btn-soft-delete:hover { opacity: 0.85; color: inherit; }

        h3 { font-weight: 700; color: #1e1b4b; }

        table thead { background: #f8fafc; }
        table th { color: #64748b; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }

        .badge { border-radius: 8px; padding: 6px 12px; font-weight: 500; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand"><i class="bi bi-briefcase-fill"></i> FreelancerTrack</div>
        <nav class="d-flex flex-column">
            <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="{% url 'client_list' %}" class="{% if 'client' in request.resolver_match.url_name %}active{% endif %}">
                <i class="bi bi-people-fill"></i> Clients</a>
            <a href="{% url 'project_list' %}" class="{% if 'project' in request.resolver_match.url_name %}active{% endif %}">
                <i class="bi bi-kanban-fill"></i> Projects</a>
            <a href="{% url 'invoice_list' %}" class="{% if 'invoice' in request.resolver_match.url_name %}active{% endif %}">
                <i class="bi bi-receipt"></i> Invoices</a>
            <hr>
            <form method="post" action="{% url 'logout' %}" class="m-0">
                 {% csrf_token %}
            <button type="submit" class="btn btn-link sidebar-logout-btn" style="all: unset; cursor:pointer; color:#c7d2fe; text-decoration:none; display:flex; align-items:center; gap:10px; padding:11px 16px; width:100%; border-radius:8px; font-weight:500;">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
            </form>
            <!-- <a href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Logout</a> -->
        </nav>
    </div>

    <div class="main-content flex-grow-1">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} rounded-3">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
