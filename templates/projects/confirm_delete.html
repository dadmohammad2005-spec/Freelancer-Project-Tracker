{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh;">
    <div class="card border-0 shadow-sm text-center" style="max-width:450px; border-radius:18px;">
        <div class="card-body p-5">
            <div class="d-inline-flex align-items-center justify-content-center mb-3"
                 style="width:70px; height:70px; background:#fee2e2; border-radius:50%;">
                <i class="bi bi-exclamation-triangle-fill" style="font-size:1.8rem; color:#b91c1c;"></i>
            </div>

            <h5 class="fw-bold mb-2">Delete Confirmation</h5>
            <p class="text-muted mb-4">
                Are you sure you want to delete <strong style="color:#1e1b4b;">"{{ object }}"</strong>?
                <br>This action cannot be undone.
            </p>

            <form method="post" class="d-flex gap-2 justify-content-center">
                {% csrf_token %}
                <a href="javascript:history.back()" class="btn flex-grow-1"
                   style="background:#f1f4f9; color:#64748b; border-radius:10px; padding:11px; font-weight:600;">
                    Cancel
                </a>
                <button type="submit" class="btn flex-grow-1"
                        style="background: linear-gradient(90deg, #f43f5e, #be123c); color:#fff; border:none; border-radius:10px; padding:11px; font-weight:600; box-shadow: 0 4px 12px rgba(244,63,94,0.35);">
                    <i class="bi bi-trash"></i> Yes, Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
